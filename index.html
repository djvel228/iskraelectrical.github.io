    var utm = getParam('utm_source');
    var link = (utm && fanslyLinks[utm]) ? fanslyLinks[utm] : defaultLink;
    var btn = document.querySelector('.btn-fansly');
    if (btn) btn.href = link;
  });
})();
</script>
</body>
</html>
